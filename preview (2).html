<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1a0f; --bg2: #0d2214; --page-light: #f5f0e8;
    --page-mid: #ede5d0; --page-shadow: #c8b99a; --gold: #c9a84c; --gold2: #e8c97a;
    --green-dark: #1a3d22; --green-mid: #2d6e3e; --text-dark: #1a1208; --spine: #1e4a28;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); min-height:100vh;
    font-family:'Cairo',sans-serif; overflow-x:hidden;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(45,110,62,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 40%);
  }

  #langBar {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:10px 20px;
    background:linear-gradient(to bottom, rgba(10,26,15,0.98), rgba(10,26,15,0));
  }
  .lang-btn {
    padding:6px 16px; border-radius:20px;
    border:1px solid rgba(201,168,76,0.3); background:rgba(10,26,15,0.8);
    color:#aaa; font-size:0.8rem; cursor:pointer;
    font-family:'Cairo',sans-serif; transition:all 0.25s;
  }
  .lang-btn.active, .lang-btn:hover { background:var(--gold); color:var(--bg); border-color:var(--gold); font-weight:700; }

  #bookWrap {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:100vh; padding:70px 20px 80px;
  }
  .book-stage { perspective:2000px; width:min(700px,95vw); }
  .book { width:100%; display:flex; position:relative; transform-style:preserve-3d; }
  .spine {
    width:28px; min-height:500px;
    background:linear-gradient(to right, #0d2010, var(--spine), #1a3d22);
    border-radius:3px 0 0 3px; display:flex; align-items:center; justify-content:center;
    box-shadow:-4px 0 12px rgba(0,0,0,0.5); flex-shrink:0;
  }
  .spine-text {
    writing-mode:vertical-rl; color:var(--gold); font-family:'Amiri',serif;
    font-size:0.7rem; letter-spacing:2px; opacity:0.7; transform:rotate(180deg);
  }
  .pages-area { flex:1; position:relative; min-height:500px; }
  .page {
    position:absolute; inset:0; background:var(--page-light);
    border-radius:0 6px 6px 0; padding:36px 32px 28px; overflow:hidden;
    box-shadow:4px 4px 20px rgba(0,0,0,0.4), inset -2px 0 8px rgba(0,0,0,0.1);
    display:none; flex-direction:column;
    animation:pageIn 0.35s ease forwards;
  }
  .page.active { display:flex; }
  .page.cover { background:linear-gradient(135deg, var(--green-dark) 0%, #0f2e18 60%, #1a4a20 100%); }
  @keyframes pageIn {
    from { opacity:0; transform:translateX(20px) rotateY(-5deg); }
    to { opacity:1; transform:translateX(0) rotateY(0); }
  }
  .page-line {
    position:absolute; top:0; right:0; bottom:0; width:2px;
    background:linear-gradient(to bottom, transparent, rgba(180,160,120,0.3) 20%, rgba(180,160,120,0.3) 80%, transparent);
  }
  .cover-ornament { text-align:center; margin-bottom:20px; color:var(--gold); font-size:1.4rem; opacity:0.6; letter-spacing:8px; }
  .cover-title { font-family:'Amiri',serif; color:var(--gold2); font-size:clamp(1.6rem,5vw,2.4rem); text-align:center; line-height:1.4; margin-bottom:10px; text-shadow:0 0 30px rgba(201,168,76,0.4); }
  .cover-subtitle { text-align:center; color:rgba(201,168,76,0.6); font-size:0.85rem; letter-spacing:2px; margin-bottom:30px; }

  .cover-badge { background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:20px; padding:4px 14px; color:var(--gold); font-size:0.75rem; display:inline-block; margin-top:10px; }
  .cover-corner { position:absolute; width:50px; height:50px; border-color:rgba(201,168,76,0.3); border-style:solid; }
  .cover-corner.tl { top:16px; right:16px; border-width:2px 2px 0 0; border-radius:0 4px 0 0; }
  .cover-corner.tr { top:16px; left:16px; border-width:2px 0 0 2px; border-radius:4px 0 0 0; }
  .cover-corner.bl { bottom:16px; right:16px; border-width:0 2px 2px 0; border-radius:0 0 4px 0; }
  .cover-corner.br { bottom:16px; left:16px; border-width:0 0 2px 2px; border-radius:0 0 0 4px; }
  .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid rgba(180,160,120,0.3); }
  .chapter-label { font-size:0.7rem; color:var(--green-mid); letter-spacing:1px; text-transform:uppercase; font-weight:600; }
  .page-num { font-size:0.7rem; color:var(--page-shadow); }
  .page-body { flex:1; overflow:hidden; }
  .chapter-title { font-family:'Amiri',serif; color:var(--green-dark); font-size:clamp(1rem,3vw,1.25rem); margin-bottom:14px; line-height:1.5; border-right:3px solid var(--gold); padding-right:10px; }

  .bullet-list { list-style:none; padding:0; margin:8px 0; }
  .bullet-list li { font-family:'Amiri',serif; color:var(--text-dark); font-size:clamp(0.82rem,2vw,0.94rem); line-height:1.8; padding-right:16px; position:relative; margin-bottom:4px; }
  .bullet-list li::before { content:'◆'; position:absolute; right:0; color:var(--gold); font-size:0.5rem; top:8px; }

  /* PAYWALL PAGE */
  .paywall-page {
    position:absolute; inset:0; background:var(--page-light);
    border-radius:0 6px 6px 0;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:30px; text-align:center;
    box-shadow:4px 4px 20px rgba(0,0,0,0.4);
    animation:pageIn 0.35s ease forwards;
  }
  .paywall-page.active { display:flex; }
  .paywall-blur {
    position:absolute; inset:0;
    background:linear-gradient(to bottom, transparent 0%, rgba(245,240,232,0.7) 30%, var(--page-light) 60%);
    border-radius:0 6px 6px 0;
  }
  .paywall-content { position:relative; z-index:2; }
  .paywall-icon { font-size:48px; margin-bottom:12px; }
  .paywall-title { font-family:'Amiri',serif; color:var(--green-dark); font-size:1.3rem; margin-bottom:8px; }
  .paywall-sub { color:#666; font-size:0.85rem; line-height:1.6; margin-bottom:20px; }
  .paywall-btn {
    display:inline-block; padding:12px 28px;
    background:linear-gradient(135deg, var(--gold), var(--gold2));
    color:var(--bg); font-weight:700; font-size:0.95rem;
    border:none; border-radius:8px; cursor:pointer;
    font-family:'Cairo',sans-serif; text-decoration:none;
    transition:opacity 0.2s; margin-bottom:8px;
  }
  .paywall-btn:hover { opacity:0.85; }
  .paywall-price { color:#888; font-size:0.8rem; margin-top:6px; }

  #controls {
    position:fixed; bottom:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center; gap:16px;
    padding:14px 20px;
    background:linear-gradient(to top, rgba(10,26,15,0.98), rgba(10,26,15,0));

  .ctrl-btn {
    width:48px; height:48px; border-radius:50%;

    color:var(--gold); font-size:1.2rem; cursor:pointer;

  }
  .ctrl-btn:hover { background:var(--gold); color:var(--bg); border-color:var(--gold); }
  .ctrl-btn:disabled { opacity:0.3; cursor:default; }
  .page-indicator { color:rgba(201,168,76,0.6); font-size:0.8rem; min-width:80px; text-align:center; }
  .book-stage { cursor:pointer; user-select:none; }
</style>
</head>

        <span class="page-num">${p.pageNum}</span>
      </div>
      <div class="page-body">
        <div class="page-text">${p.content[currentLang]}</div>
      </div>
      <div class="page-line"></div>
    `;
  }
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === pages.length - 1;
  document.getElementById('pageIndicator').textContent = `${idx+1} / ${pages.length}`;
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= pages.length) return;
  currentPage = next; renderPage(currentPage);
}

function isRTL() { return currentLang === 'darija' || currentLang === 'arabic'; }

function navigate(dir) {
  if (isRTL()) {
    changePage(dir === 'next' ? 1 : -1);
  } else {
    changePage(dir === 'next' ? 1 : -1);
  }
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const rtl = isRTL();
  document.documentElement.dir = rtl ? 'rtl' : 'ltr';
  // Update arrows
  document.getElementById('prevBtn').innerHTML = rtl ? '&#8594;' : '&#8592;';
  document.getElementById('nextBtn').innerHTML = rtl ? '&#8592;' : '&#8594;';
  renderPage(currentPage);
}

renderPage(0);

let startX = 0;
document.getElementById('bookStage').addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
document.getElementById('bookStage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) {
    if (isRTL()) {
      changePage(dx < 0 ? 1 : -1);
    } else {
      changePage(dx > 0 ? -1 : 1);
    }
  }
});
</script>
</body>
</html>
