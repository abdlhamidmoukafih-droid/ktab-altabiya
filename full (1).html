{type:'inner',ch:'mq',n:2,c:{
d:`<p>ولكن مافيها باس جبدنا هاد الموضوع، أجي نتفلسفو فيه شوية، ما خاسرين والو. وأنا بيني وبينك داير ليك هاد الدخلة غير باش نجبد معاك هاد الموضوع، أنا ما قصدتك والمقصود الله، ماعليناش، هههه.</p>

<p>نرجعو شوية للّور، نبداو من الأصل. كُلنا كنعرفو أن حنا جينا على تطوُّر. هنا غاتفكر شوية وتطرح سؤال: واش حتى الأعضاء والأماكن ديالها عقلو على هاد الأماكن دابا ورجعولها؟</p>
<p>واش تقدر المثلية تكون عندها علاقة بهادشي؟ أنا غانجي وندير فيها فيلسوف ونقولك: آه كاين، ممكن. حنا نحطو الأدلة ديالي وانت شوف.</p>
<p>عمرك تساءلتي وگلتي: <strong>علاش البروستات جاية جهة الدبر؟</strong> بلُغتنا حنا "الخرزة". على حساب النظرية ديالي، غاتقولي: كون كانت صحيحة، البروستات ما محتاجاش تكون مشاركة، راه عندها واحد الدور آخر. أنا بالنسبة ليا، النقطة الأقرب بيناتهم هي هاديك.</p>
<p>البروستات هي واحد الغدة صغيرة، الحجم ديالها بحال شي كركاعة ولا مشماشة (فيها تقريباً بين 11 حتى 20 غرام عند الراجل البالغ)، وكاينة غير عند الرجال. البلاصة ديالها: كاينة نيشان تحت المثانة، وقدام المستقيم.</p>`,
a:`<div class="ch-title">الفصل الأول: من الأصل إلى البروستات</div>
<p>لنعود قليلاً إلى الوراء. كلنا نعرف أننا جئنا عبر التطور. هل تساءلت يوماً: <strong>لماذا تقع البروستات في اتجاه الشرج؟</strong></p>
<p>البروستات هي غدة صغيرة بحجم حبة الكستناء (من 11 إلى 20 غراماً عند الرجل البالغ)، موجودة فقط عند الذكور. موقعها: أسفل المثانة مباشرة، وأمام المستقيم.</p>`,
f:`<div class="ch-title">Chapitre 1 : De l'origine à la prostate</div>
<p>Remontons un peu en arrière. T'es-tu jamais demandé : <strong>pourquoi la prostate se trouve-t-elle du côté de l'anus ?</strong></p>
<p>La prostate est une petite glande de la taille d'une châtaigne (environ 11 à 20 grammes chez l'homme adulte), présente uniquement chez les hommes.</p>`,
e:`<div class="ch-title">Chapter 1: From Origins to the Prostate</div>
<p>Let's go back a little. Have you ever asked yourself: <strong>why is the prostate located near the anus?</strong></p>
<p>The prostate is a small gland about the size of a walnut (approximately 11 to 20 grams in an adult male), found only in men.</p>`
}},

// C1-2
{type:'inner',ch:'c1',n:5,c:{
d:`<p>هنا بانت ليا ثغرة: يقدر تكون هاديك هي أقرب position ديالها، ويكون عندها دور ثانوي. مايكونش الذكر عبر التطور كان كيمارس المثلية من الخلف، وهي اللي خلات البروستات يجي قريب من القضيب؟</p>
<div class="hl">وبشكل أعمق، تقدر تكون حتى المسافة عندها علاقة برياضيات الجنس:
<ul class="bl" style="margin-top:6px">
<li>المسافة بين البروستات (مسؤولة على النشوة) والقضيب: من 5 تال 7 سم</li>
<li>المسافة بينها وبين فتحة الدبر: 2 سم فقط</li>
</ul></div>
<p>هنا عاوتاني كاتقول: واش كيمارس من اللور كتر من القضيب؟ حنا كندويو عبر تاريخ المخلوقات.</p>
<p>ممكن يكون مع الوقت ما بقاتش غير دور التكاثر، بداو يتأكتيفاو المشاعر والأحاسيس، ولات المتعة بحد ذاتها عايشة فالجسد. مع الوقت، ممكن الرجل بدا يحس بالانجذاب جيهة الرجل لأسباب نفسية مثلاً، كايبغي يحس معاه براجل فحياتو.</p>
<p>حنا كنستنتجو أنا وياك، ماكنقولش هادي هي الحقيقة المطلقة، مجرد استنتاجات.</p>`,
a:`<p>هنا وجدت ثغرة: ربما يكون ذلك الموقع هو الأقرب لها، ولها دور ثانوي. ماذا لو كان الذكر عبر التطور يمارس المثلية من الخلف، وهذا ما جعل البروستات تقترب من القضيب؟</p>
<div class="hl">المسافة بين البروستات والقضيب: 5 إلى 7 سم<br>المسافة بينها وبين فتحة الشرج: 2 سم فقط</div>
<p>هل هذه الخريطة التشريحية مجرد مصادفة؟</p>`,
f:`<p>C'est là que j'ai remarqué une faille : la distance entre la prostate et le pénis est d'environ 5 à 7 cm, mais la distance entre elle et l'anus est de seulement 2 cm.</p>
<div class="hl">Cette carte anatomique est-elle vraiment une coïncidence ?</div>`,
e:`<p>This is where I noticed a gap: the distance between the prostate and penis is approximately 5 to 7 cm, but the distance between it and the anus is only 2 cm.</p>
<div class="hl">Is this anatomical map really just a coincidence?</div>`
}},

// C2-1
{type:'inner',ch:'c2',n:6,c:{
d:`<div class="ch-title">الفصل الثاني: الجانب النفسي وتاريخ الأحكام</div>
<p>غانديرو الاستنتاج النهائي ديال داكشي اللي گلنا: استنتجنا أنه بما أن حنا عبارة على جينات وحنا غير واحد مجموعة ديال سلوكيات إنسانية وجسدية ديال الإنسان اللي فاتنا، فراه البروستات ما كانت مكانها تمة غير هكاك إلى عندها علاقة مباشرة.</p>
<p>حنا حالياً راه اللي مخليينا على قيد الحياة وجيناتنا قوية باش تشبت بالبقاء، هي الأحاسيس والمشاعر: <strong>متعة، حزن، خوف، أمان…</strong> الحزن؟ راه حتى هو ضروري. كون ماكانش الحزن، كون الوجود ما عندو معنى.</p>
<p>دابا حنا كنستنتجو أن حتى هاد الأحاسيس عندها علاقة مباشرة بالإنسان عبر التاريخ. والدوبامين هو اللي كيتفرز فاش كتكون فعلاقة جنسية. دماغك هنا كيدير:</p>
<div class="hl">"اللي كيجيب ليا هاد الشعور = حاجة زوينة = نعاودها"</div>`,
a:`<div class="ch-title">الفصل الثاني: الجانب النفسي وتاريخ الأحكام</div>
<p>بما أننا عبارة عن جينات، ومجموعة من السلوكيات الإنسانية الموروثة، فالبروستات لم تأت في ذلك الموضع عبثاً.</p>
<p>الدوبامين هو ما يُفرز حين تعيش متعة. دماغك يصنع رابطاً:</p>
<div class="hl">"ما يمنحني هذا الشعور = شيء جيد = أريد تكراره"</div>`,
f:`<div class="ch-title">Chapitre 2 : L'aspect psychologique</div>
<p>Puisque nous sommes des gènes et un ensemble de comportements humains hérités, la prostate n'est pas arrivée à cet endroit par hasard.</p>
<div class="hl">"Ce qui me donne cette sensation = quelque chose de bien = je veux le répéter"</div>`,
e:`<div class="ch-title">Chapter 2: The Psychological Aspect</div>
<p>Since we are genes and a collection of inherited human behaviors, the prostate didn't end up in that location by accident.</p>
<div class="hl">"What gives me this feeling = something good = I want to repeat it"</div>`
}},

// C2-2
{type:'inner',ch:'c2',n:7,c:{
d:`<p>أجي نخربقو شوية فالآلاف العوام الماضية. حنا كلنا عارفين بأن المثلية عندها تاريخ موثق ومقبولة اجتماعياً.</p>
<p>شنو دارو؟ ولات المثلية ممنوعة اجتماعياً. وكاين تفسيرين: اللي مؤمن بخالق إبراهيمي سيقول "حرام". واللي مقطع الوراق سيقول: ربما ناس كانت تريد التكاثر السريع وقررت تحريمها اجتماعياً ودينياً؟</p>
<p>إذن كاين اختلاف بين الجينات والأحكام الاجتماعية. واللي بغينا نوصلو ليه: هاد الاختلاف هو اللي مخليك ما تتصالحش مع راسك.</p>
<p>فاش كتشوف المجتمع والدين يرفض داكشي نهائياً، دماغك كيقول: "أنا ما كنبغيش الدراري." وهنا كيولد الكبت والمعاناة الداخلية.</p>`,
a:`<p>الجميع يعلم أن المثلية لها تاريخ موثق وكانت مقبولة اجتماعياً. ثم أصبحت محظورة اجتماعياً، وهناك تفسيران لذلك.</p>
<p>ما نريد الوصول إليه: هذا الاختلاف بين الجينات والأحكام الاجتماعية هو ما يجعلك لا تتصالح مع نفسك.</p>`,
f:`<p>Tout le monde sait que l'homosexualité a une histoire documentée et était socialement acceptée. Ce que nous voulons atteindre : cette différence entre les gènes et les jugements sociaux est ce qui t'empêche de te réconcilier avec toi-même.</p>`,
e:`<p>Everyone knows homosexuality has a documented history and was once socially accepted. What we want to reach: this difference between genes and social judgments is what prevents you from reconciling with yourself.</p>`
}},

// C3-1
{type:'inner',ch:'c3',n:8,c:{
d:`<div class="ch-title">الفصل الثالث: أنواع المثلية والشخصية</div>
<p>دابا حالياً، عندنا أنواع ديال المثليين:</p>
<ul class="bl">
<li><strong>سالب 💯:</strong> كايحس براسو مرا – كاين اللي غير بينو وبين راسو، وكاين اللي خارج ليها كود (Direct)</li>
<li><strong>Les deux:</strong> كيبغي موجب وسالب، هاد النوع غالباً كيكون مرجّل</li>
<li><strong>موجب 💯</strong></li>
<li><strong>Bi (مزدوج الميول):</strong> كاين Bi Actif، Bi Passif، Bi Les deux</li>
<li><strong>مكبوت:</strong> ظروفو الاجتماعية والمادية خلاتو يكون Actif فدماغو بس</li>
</ul>
<p>حنا شنو غانديرو؟ غانحاولو نفهمو كل واحد علاش هو فديك الحالة المعينة. باش يكون صحيح (بما أن حنا غير جينات)، ما خاصش يكونو هاد الأنواع، خاص نكونو متقاربين على الأقل.</p>`,
a:`<div class="ch-title">الفصل الثالث: أنواع المثلية والشخصية</div>
<ul class="bl">
<li><strong>السالب:</strong> يشعر أنه أنثى</li>
<li><strong>الاثنان:</strong> يحب الدورين</li>
<li><strong>الموجب</strong></li>
<li><strong>ثنائي الميول (Bi):</strong> بأشكاله المختلفة</li>
<li><strong>المكبوت:</strong> ظروفه تمنعه من التعبير</li>
</ul>`,
f:`<div class="ch-title">Chapitre 3 : Les types d'homosexualité</div>
<ul class="bl">
<li><strong>Passif :</strong> Se sent féminin</li>
<li><strong>Les deux (Versatile)</strong></li>
<li><strong>Actif</strong></li>
<li><strong>Bisexuel (Bi) :</strong> sous différentes formes</li>
<li><strong>Refoulé :</strong> ses circonstances l'empêchent de s'exprimer</li>
</ul>`,
e:`<div class="ch-title">Chapter 3: Types of Homosexuality</div>
<ul class="bl">
<li><strong>Passive:</strong> Feels feminine</li>
<li><strong>Both (Versatile)</strong></li>
<li><strong>Active</strong></li>
<li><strong>Bisexual (Bi):</strong> in various forms</li>
<li><strong>Suppressed:</strong> circumstances prevent expression</li>
</ul>`
}},

// C3-2
{type:'inner',ch:'c3',n:9,c:{
d:`<p><strong>1) المبنّت علناً:</strong> هاد النوع أدّاتو ظروف الحياة للحساسية الزايدة وضعف الشخصية. تخيل بنادم يعيش فمجتمع كيقول: "المثلي = ناقص رجولة، حرام، شذوذ…" وهو فداخلو كيعرف أنه كيميل لهاد النوع ديال العلاقة.</p>
<p>شنو كيوقع؟ كبت داخلي، تساؤلات طويلة: "علاش أنا هكا؟ علاش ماشي بحال صحابي؟" مع الوقت، كيلقى راحو فدور "المرة"، كيقلد صورة الأنثى، كيعطي الجرأة للذات اللي كانت مخبيا.</p>
<p><strong>2) سالب ولكن مرجّل:</strong> كاين جوج احتمالات؛ إما راه ما عندوش الجرأة، أو المكانة الاجتماعية والعائلية ما كتسمحلوش. فالأخير كيولي مرا مع راسو وراجل فالمجتمع، عايش جوج شخصيات.</p>
<p><strong>3) Les deux (Versatile):</strong> الظروف ديالو خلاتو يستنتج أنه يقدر يجمع الاتجاهين. الدور اللي كيلعبو فالعلاقة كيولي مسألة ديال الشعور فداك اللحظة، ماشي هوية ثابتة.</p>`,
a:`<p><strong>1) المخنّث علناً:</strong> ظروف الحياة جرّته للحساسية الزائدة. مع الوقت يجد نفسه في دور "المرأة".</p>
<p><strong>2) سالب لكن رجولي:</strong> إما لأن الجرأة لم تصله، أو لأن مكانته الاجتماعية لا تسمح له. يعيش شخصيتين.</p>
<p><strong>3) الاثنان (Versatile):</strong> الدور الذي يلعبه يصبح مسألة شعور لحظي، ليس هوية ثابتة.</p>`,
f:`<p><strong>1) Efféminé au grand jour :</strong> Les circonstances l'ont mené à l'hypersensibilité. Avec le temps, il se retrouve dans le rôle de "la femme".</p>
<p><strong>2) Passif mais viril :</strong> Soit manque de courage, soit statut social. Vit deux personnalités.</p>
<p><strong>3) Les deux (Versatile) :</strong> Le rôle devient une question de ressenti du moment, pas une identité fixe.</p>`,
e:`<p><strong>1) Openly Effeminate:</strong> Life circumstances led to hypersensitivity. Over time, they find themselves in the "woman's" role.</p>
<p><strong>2) Passive but Masculine:</strong> Either lacks courage or social status prevents it. Lives two personalities.</p>
<p><strong>3) Both (Versatile):</strong> The role becomes a matter of feeling in the moment, not a fixed identity.</p>`
}},

// C3-3
{type:'inner',ch:'c3',n:10,c:{
d:`<p><strong>4) الموجب (Actif):</strong> هاد خونا غالباً كيكون عندو واحد التوازن بين شخصيتو وجيناتو. من شخصيتو كيبغي يكون هو الموجب وهو المسيطر فالعلاقة، والعامل النفسي مسيطر على الجينات على حساب المعايير ديال المجتمع.</p>
<p><strong>5) Bi (مزدوج الميول):</strong> غالباً هاد السيد من صغرو عاش مع البنات، وغالباً ما كتكون تجربتو الأولى مع بنت، ومن بعد عاد كيبقى غادي فرحلة اكتشاف الذات. وبالنسبة للأدوار، كاين Bi Actif وكاين Bi Les deux وكاين Bi Passif.</p>
<p><strong>6) المكبوت:</strong> راه حتى هو كيمارس الجينات ديالو، غير ظروفو الاجتماعية والمادية خلاتو يكون Actif فدماغو بأصح التعبير، ولكن الإمكانيات المادية ما كتعاونش. احتمال كبير كون كان عندو فلوس يقدر يوصل يكون Bi.</p>
<p>وكاين حتى النوع اللي كيسمى Hétéro: ظروف الحياة والمراحل لاعبين بشكل كبير فيه. كتلقى هاد النوع ظروفو المادية معاوناه، وكايكون فمرحلة مكتفي بالبنت، عمرو ذاق ديك التجربة الأخرى.</p>`,
a:`<p><strong>4) الموجب (Actif):</strong> لديه توازن بين شخصيته وجيناته. يحب أن يكون هو المسيطر في العلاقة.</p>
<p><strong>5) ثنائي الميول (Bi):</strong> نشأ غالباً وسط الإناث، أول تجربة مع امرأة ثم اكتشف الاتجاه الآخر. أشكاله: Bi Actif, Bi Passif, Bi Les deux.</p>
<p><strong>6) المكبوت:</strong> لديه الجينات لكن ظروفه المادية والاجتماعية لا تسمح له. لو كان لديه إمكانيات لكان Bi.</p>`,
f:`<p><strong>4) Actif :</strong> A un équilibre entre sa personnalité et ses gènes. Aime être dominant dans la relation.</p>
<p><strong>5) Bisexuel :</strong> A souvent grandi entouré de femmes, première expérience avec une femme puis découverte de l'autre direction.</p>
<p><strong>6) Refoulé :</strong> A les gènes mais ses circonstances ne lui permettent pas de les exprimer.</p>`,
e:`<p><strong>4) Active:</strong> Has balance between personality and genes. Likes to be dominant in the relationship.</p>
<p><strong>5) Bisexual:</strong> Often grew up surrounded by women, first experience with a woman then discovered the other direction.</p>
<p><strong>6) Suppressed:</strong> Has the genes but circumstances don't allow expression.</p>`
}},

// C4-1
{type:'inner',ch:'c4',n:11,c:{
d:`<div class="ch-title">الفصل الرابع: نربطو النقط ونعريو الحقيقة</div>
<p>دابا حنا غانحاولو نفهمو من الفوق. تخيل راسك الفوق، والأنواع كتشوف فيهم بذاك الوصف. كتلقى أن داك الـ Passif المشوه، إلى بدلنا ليه مشوار الحياة وحطيناه فمشوار ديال Actif أو Hétéro مثلاً، غادي تبدّل ليهم حتى الميولات الجنسية.</p>
<p>دونك هنا كايبان لينا أنه عندنا الحق نتحكمو فيهم. ونلاقيو نقطة وحدة إلى بغينا نوحدوهم.</p>
<p>عندنا عرفنا أن هادشي اللي فيك راه جينات. وعرفنا منين جاو الأحكام الاجتماعية والدينية. إلى ربطنا هاد الجوج غانلقاو: كون ما كانش هادشي اللي دارو المجتمع والأديان، كون عايشين الطبيعة ديالنا، مرتاحين وعايشين الحياة En rose!</p>
<div class="hl">الدور ديالنا الآن: نرجعو الورد لبلاصتو، ونعيشوه كاملين.</div>`,
a:`<div class="ch-title">الفصل الرابع: ربط النقاط وكشف الحقيقة</div>
<p>الآن نحاول أن نرى من الأعلى. إذا غيّرنا مسار حياة الـ Passif وضعناه في مسار Actif، ستتغير حتى ميوله الجنسية.</p>
<p>هذا يعني أن بإمكاننا التحكم فيها. ولو لم تكن الأحكام الاجتماعية والدينية، لكنا نعيش طبيعتنا بشكل مريح.</p>
<div class="hl">دورنا الآن: إعادة الوردة إلى مكانها، وعيشها كاملين.</div>`,
f:`<div class="ch-title">Chapitre 4 : Relier les points et révéler la vérité</div>
<p>Si on changeait le parcours de vie d'un Passif et le mettait dans le parcours d'un Actif, ses attirances sexuelles changeraient aussi.</p>
<div class="hl">Notre rôle maintenant : remettre la rose à sa place et la vivre pleinement.</div>`,
e:`<div class="ch-title">Chapter 4: Connecting the Dots and Revealing the Truth</div>
<p>If we changed the life path of a Passive person and put them in an Active person's path, even their sexual attractions would change.</p>
<div class="hl">Our role now: return the rose to its place, and live it fully.</div>`
}},

// C4-2
{type:'inner',ch:'c4',n:12,c:{
d:`<p>كيف گلنا، كاتكبر بأفكار من الصغر: "لا لا لا، المثلية خط أحمر فالمجتمع"، وانت كتحس بطبيعتك. فاش كتشوف المجتمع والدين يرفض داكشي نهائياً، دماغك كيقول: "أنا ماشي ديال الدراري."</p>
<p>فاش كاتنعس مع البنت فالفراش، كاينوض داك الضغط ديال المجتمع والدين رافض داكشي وأنا كنرتاح فيه. الدماغ كايرسل إشارات ديال القضيب والدوبامين اللي خاص يكونو حاضرين فعلاقة جنسية، لا كايوظفهومش. وهنا كاتلقى مالقيتيش لا متعة، ولا قضيب ديالك بغى يبقى منتصب.</p>
<p>إلى انت فهمتي هادشي كامل، إلى فهمتي أنك راه طبيعي تمارس مع دري وبنت، غادي تكون à l'aise، والدوبامين خدامين مزيان. هكا غاتصالح مع راسك.</p>
<div class="hl">وملي حلّينا هاد القوس: هاد الرسالة ليك أختي: إلى كان راجلك كيبغي يمارس مع دري، خاصك تكوني كتحترمي الطبيعة ديالو.</div>`,
a:`<p>حين تنام مع امرأة في الفراش، يبدأ ضغط المجتمع والدين الرافض لما ترتاح إليه. ولهذا قد لا تجد متعة ولا انتصاباً.</p>
<p>إذا فهمت أنه من الطبيعي أن تمارس مع رجل وامرأة، ستكون مرتاحاً، والدوبامين سيعمل بشكل جيد. هكذا ستتصالح مع نفسك.</p>`,
f:`<p>Quand tu dors avec une femme dans le lit, la pression de la société qui rejette ce en quoi tu te sens à l'aise commence. C'est pourquoi tu ne trouves pas de plaisir.</p>
<p>Si tu comprends qu'il est naturel de pratiquer avec un homme et une femme, tu seras à l'aise et la dopamine fonctionnera bien.</p>`,
e:`<p>When you sleep with a woman in bed, society's pressure against what you feel comfortable with begins. This is why you may find no pleasure.</p>
<p>If you understand that it's natural to be with both a man and woman, you'll be comfortable and dopamine will work well.</p>`

<div class="hl">الشذوذ الجنسي الحقيقي: هو أنك ما ديرش ديك الحاجة اللي كتحسها من الداخل، أو تبدا تقول حتى انت راه داكشي شذوذ. هاد الفكرة بحد ذاتها: شذوذ فكري.</div>
<p>فالنصيحة ديالي الأولى: عنقو بعضياتكم. وإلى كنتي أختي وراجلك كيبغي يمارس مع دري، خاصك تحترمي الطبيعة ديالو. وإلى قريتي الكتاب كامل، غاتكوني مقتنعة وغاتجيك عادية.</p>`,
a:`<div class="ch-title">الخاتمة: حقيقة الشذوذ والمصالحة مع الذات</div>

f:`<div class="ch-title">Conclusion : La vraie déviance et la réconciliation</div>

function isRTL(){return lang==='d'||lang==='a';}

function renderPage(idx){
  const p=pages[idx];
  const area=document.getElementById('pagesArea');
  area.querySelectorAll('.page,.paywall-page').forEach(el=>el.classList.remove('active'));
  let el=area.querySelector(`[data-page="${idx}"]`);
  if(!el){el=document.createElement('div');el.dataset.page=idx;area.appendChild(el);}

  if(p.type==='cover'){
    el.className='page cover active';
    const tv=T.cover[lang];
    el.innerHTML=`
      <div class="cover-corner tl"></div><div class="cover-corner tr"></div>
      <div class="cover-corner bl"></div><div class="cover-corner br"></div>
      <div class="cover-bg">طبيعة</div>
      <div class="cover-wrap">
        <div class="cover-tag">${tv[3]}</div>
        <div class="cover-title">${tv[0]} <span>${tv[1]}</span></div>
        <div class="cover-sub">${tv[2]}</div>
        <div class="cover-line"></div>
        <div class="cover-author">بقلم <span>RVR & Abdo Moka</span></div>
        <div class="cover-edition">النسخة الكاملة • 2025</div>
      </div>`;
  } else if(p.type==='back-cover'){
    el.className='page back-cover active';
    const q={d:'الطبيعة… أ ربيعة،\nماشي دايماً كما كيصوروها ليك،\nولكن دائماً فيها منطق،\nإلا عطيت لدماغك الفرصة يفهمو.',
      a:'الطبيعة… يا ربيعة،\nليست دائماً كما يصوّرونها لك،\nلكن فيها دائماً منطق.',
      f:'La nature… ô Rabia,\nn\'est pas toujours comme on te la décrit,\nmais elle a toujours une logique.',
      e:'Nature… O Rabia,\nnot always as they paint it for you,\nbut always with logic within.'};
    el.innerHTML=`<div class="back-wrap">
      <div style="color:rgba(64,145,108,0.25);font-size:2rem;margin-bottom:16px;">❝</div>
      <div class="back-quote">${q[lang].replace(/\n/g,'<br>')}</div>
      <div style="color:rgba(245,230,200,0.3);font-size:0.85rem;">RVR & Abdo Moka</div>
    </div>`;
  } else if(p.type==='paywall'){
    el.className='paywall-page active'; showPwModal();
    const waMsg=encodeURIComponent('مرحبا، بغيت نشري الكتاب الكامل 📚');
    const msgs={
      d:{title:'هنا توقفنا… 🔒',sub:'الكتاب الكامل فيه بزاف أكثر:\nالأنواع، الجانب النفسي، الحقيقة الكاملة.',lbl:'خلص عبر RIB ديال Attijariwafa',price:'9$ (تقريباً 90 DH)',note:'خلص وبعث screenshot على WhatsApp، نبعث ليك كود الدخول',wa:'تواصل على WhatsApp'},
      a:{title:'توقفنا هنا… 🔒',sub:'الكتاب الكامل يحتوي الكثير أكثر.',lbl:'ادفع عبر RIB',price:'9$ (حوالي 90 DH)',note:'ادفع وأرسل لقطة شاشة على WhatsApp، سنرسل لك كود الدخول',wa:'تواصل على WhatsApp'},
      f:{title:'On s\'arrête ici… 🔒',sub:'Le livre complet contient beaucoup plus.',lbl:'Payer via RIB Attijariwafa',price:'9$ (environ 90 DH)',note:'Payez et envoyez une capture d\'écran sur WhatsApp, nous vous enverrons le code',wa:'Contacter sur WhatsApp'},
      e:{title:'We stop here… 🔒',sub:'The full book contains much more.',lbl:'Pay via RIB Attijariwafa',price:'9$ (approx 90 DH)',note:'Pay and send a screenshot on WhatsApp, we\'ll send you the access code',wa:'Contact on WhatsApp'}
    };
    const m=msgs[lang];
    el.innerHTML=`
      <div class="pw-icon">📚</div>
      <div class="pw-title">${m.title}</div>
      <div class="pw-sub">${m.sub.replace(/\n/g,'<br>')}</div>
      <div class="pay-box">
        <div class="pay-label">${m.lbl}</div>
        <div class="rip-num">${RIP}</div>
        <div class="pay-price">${m.price}</div>
        <div class="pay-note">${m.note}</div>
      </div>
      <div class="divider">— أو —</div>
      <a href="https://wa.me/${WA}?text=${waMsg}" target="_blank" class="wa-btn">💬 ${m.wa}</a>`;
  } else {
    el.className='page active';
    el.innerHTML=`
      <div class="page-header">
        <span class="chapter-label">${T.ch[p.ch][lang]}</span>
        <span class="page-num">${p.n}</span>
      </div>
      <div class="page-body">
        <div class="page-text">${p.c[lang]}</div>
      </div>`;
  }
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===pages.length-1;
  document.getElementById('pageInd').textContent=`${idx+1} / ${pages.length}`;
}

function changePage(d){
  const next=pg+d;
  if(next<0||next>=pages.length)return;
  if(!unlocked&&next>=FREE+1&&pages[next].type!=='paywall'){
    pg=FREE+1;renderPage(pg);return;
  }
  pg=next;renderPage(pg);
}

function nav(dir){
  changePage(dir==='next'?1:-1);
}

function setLang(l,btn){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.documentElement.dir=isRTL()?'rtl':'ltr';
  document.getElementById('prevBtn').innerHTML=isRTL()?'&#8594;':'&#8592;';
  document.getElementById('nextBtn').innerHTML=isRTL()?'&#8592;':'&#8594;';
  renderPage(pg);
}

function checkCode(){
  const v=document.getElementById('codeInput').value.trim().toUpperCase();
  if(isValidCode(v)){
    unlocked=true;
    localStorage.setItem('rvr_access','1');
    // Close paywall modal and go to next page
    document.getElementById('pwModal').style.display='none';
    pg = FREE+2; // jump past paywall to first paid page
    renderPage(pg);
  } else {
    document.getElementById('codeError').textContent='❌ الكود غلط';
    document.getElementById('codeInput').style.borderColor='#c0392b';
  }
}
document.getElementById('codeInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')checkCode();
  document.getElementById('codeError').textContent='';
  document.getElementById('codeInput').style.borderColor='';
});

// Auto-open book directly, no code needed to start
(function(){
  document.getElementById('accessModal').style.display='none';
  document.getElementById('langBar').style.display='flex';
  document.getElementById('bookWrap').style.display='flex';
  document.getElementById('controls').style.display='flex';
  if(localStorage.getItem('rvr_access')==='1'){unlocked=true;}
  renderPage(0);
})();

let startX=0;
document.getElementById('bookStage').addEventListener('touchstart',e=>{startX=e.touches[0].clientX;});
document.getElementById('bookStage').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>40){
    if(isRTL())changePage(dx<0?1:-1);
    else changePage(dx>0?-1:1);
  }
});
</script>
